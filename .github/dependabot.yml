version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "dipu989"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      prefix-scope: "deps"
    pull-request-branch-name:
      separator: "/"
